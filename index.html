<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Multi Plus TV Admin</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{--bg:#030712;--panel:#071022;--panel2:#0b1731;--line:rgba(135,209,255,.18);--text:#f6fbff;--muted:#9db7d7;--blue:#25c7ff;--blue2:#225cff;--green:#5cff9a;--red:#ff5f7f;--amber:#ffd56b;--pink:#ff65df;--shadow:0 24px 70px rgba(0,0,0,.48)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 10% 0%,rgba(37,199,255,.18),transparent 34%),radial-gradient(circle at 88% 10%,rgba(255,101,223,.16),transparent 33%),linear-gradient(180deg,#030712,#061024 60%,#030712);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}body{padding:14px}.app{max-width:1180px;margin:0 auto}.top{display:flex;align-items:center;gap:13px;padding:14px;border-radius:28px;background:linear-gradient(135deg,rgba(8,25,58,.92),rgba(4,11,28,.92));border:1px solid var(--line);box-shadow:var(--shadow);position:sticky;top:10px;z-index:5;backdrop-filter:blur(18px)}.logo{width:58px;height:58px;border-radius:19px;background:#fff;padding:5px;object-fit:contain}.title{flex:1;min-width:0}.title h1{margin:0;font-size:24px;line-height:1.05;letter-spacing:.2px;background:linear-gradient(90deg,#91eeff,#b4a5ff,#ff75e7);-webkit-background-clip:text;color:transparent}.title small{display:block;margin-top:5px;color:#b8d6ff;font-weight:800;font-size:12px}.topActions{display:flex;gap:8px}.iconBtn{border:1px solid rgba(255,255,255,.14);background:linear-gradient(135deg,#13244d,#071126);color:#dff6ff;border-radius:17px;width:46px;height:46px;font-size:20px;font-weight:900;box-shadow:0 12px 24px rgba(0,0,0,.28)}.statusBar{display:flex;align-items:center;gap:9px;margin:14px 2px 0;color:#bdd9ff;font-weight:800;font-size:13px}.dot{width:10px;height:10px;border-radius:99px;background:#ffd56b;box-shadow:0 0 12px #ffd56b}.dot.ok{background:#5cff9a;box-shadow:0 0 14px #5cff9a}.dot.err{background:#ff5f7f;box-shadow:0 0 14px #ff5f7f}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}.card{border:1px solid var(--line);background:linear-gradient(180deg,rgba(10,25,58,.88),rgba(3,11,29,.92));border-radius:26px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.metric{padding:18px 14px;position:relative;overflow:hidden}.metric:before{content:"";position:absolute;right:-22px;top:-28px;width:88px;height:88px;border-radius:50%;background:radial-gradient(circle,rgba(37,199,255,.28),transparent 66%)}.metric b{display:block;font-size:30px;letter-spacing:.4px}.metric span{display:block;color:var(--muted);font-size:12px;font-weight:900;margin-top:3px}.layout{display:grid;grid-template-columns:390px 1fr;gap:14px;margin-top:14px}.section{padding:16px}.section h2{margin:0 0 14px;font-size:17px}.field{display:flex;flex-direction:column;gap:7px;margin-bottom:11px}.field label{font-size:12px;color:#b7d7ff;font-weight:900}.input,select,textarea{width:100%;border:1px solid rgba(148,218,255,.18);background:rgba(3,10,26,.74);color:#fff;border-radius:17px;padding:14px 14px;font-size:14px;outline:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}textarea{min-height:80px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btn{border:0;border-radius:18px;padding:14px 14px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:white;font-weight:1000;font-size:14px;box-shadow:0 14px 28px rgba(0,0,0,.35)}.btn.secondary{background:linear-gradient(135deg,#17264e,#071126);border:1px solid rgba(255,255,255,.12)}.btn:active,.iconBtn:active,.smallBtn:active{transform:translateY(1px)}.msg{min-height:20px;margin-top:9px;font-size:12px;font-weight:900;color:#accaff;line-height:1.35}.msg.ok{color:var(--green)}.msg.err{color:#ff9ab0}.msg.wait{color:var(--amber)}.activeBox{margin-top:12px;padding:15px;border-radius:20px;text-align:center;font-size:22px;font-weight:1000;letter-spacing:2px;border:1px solid rgba(92,255,154,.30);background:linear-gradient(135deg,rgba(13,75,45,.48),rgba(7,30,25,.72));color:#caffdc;user-select:all}.hidden{display:none!important}.list{display:grid;gap:10px;max-height:690px;overflow:auto;padding-right:4px}.list::-webkit-scrollbar{width:7px}.list::-webkit-scrollbar-thumb{background:rgba(91,211,255,.35);border-radius:99px}.item{border:1px solid rgba(255,255,255,.10);background:linear-gradient(135deg,rgba(12,27,60,.72),rgba(3,10,26,.82));border-radius:22px;padding:14px}.itemTop{display:flex;align-items:center;gap:10px;justify-content:space-between}.code{font-weight:1000;letter-spacing:1px;word-break:break-all}.chip{border-radius:99px;padding:7px 10px;font-size:11px;font-weight:1000;border:1px solid rgba(255,255,255,.12);white-space:nowrap}.chip.active{color:#7dffa5;background:rgba(43,255,124,.10)}.chip.pending{color:#ffd56b;background:rgba(255,213,107,.12)}.chip.blocked{color:#ff89a0;background:rgba(255,95,127,.12)}.chip.expired{color:#ffbd8a;background:rgba(255,166,80,.12)}.meta{margin-top:9px;color:#b7c8e5;font-size:12px;line-height:1.6}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.smallBtn{border:1px solid rgba(255,255,255,.12);background:#111d3a;color:#fff;border-radius:14px;padding:10px 12px;font-size:12px;font-weight:1000}.smallBtn.danger{background:linear-gradient(135deg,#d6335b,#7d1231)}.smallBtn.good{background:linear-gradient(135deg,#20b86d,#0b6f43)}.smallBtn.warn{background:linear-gradient(135deg,#c78920,#7e4e08)}.modalOverlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.58);backdrop-filter:blur(18px)}.modalBox{width:min(430px,100%);border-radius:28px;padding:18px;background:radial-gradient(circle at 18% 0%,rgba(37,199,255,.20),transparent 38%),linear-gradient(180deg,rgba(10,30,70,.98),rgba(3,10,28,.99));border:1px solid rgba(151,223,255,.28);box-shadow:0 34px 90px rgba(0,0,0,.66),0 0 30px rgba(37,199,255,.16);position:relative;overflow:hidden}.modalBox:before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.10),transparent 46%,rgba(255,101,223,.06));pointer-events:none}.modalHead{position:relative;display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}.modalIcon{width:48px;height:48px;border-radius:17px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#25c7ff,#225cff);font-size:22px;font-weight:1000;box-shadow:0 14px 28px rgba(0,0,0,.35)}.modalIcon.danger{background:linear-gradient(135deg,#ff5f7f,#a01438)}.modalTitle{margin:0;font-size:20px;line-height:1.12}.modalText{position:relative;color:#bed8ff;font-size:13px;line-height:1.5;margin:8px 0 13px;word-break:break-word}.modalCode{position:relative;border-radius:18px;padding:12px;background:rgba(1,8,24,.55);border:1px solid rgba(255,255,255,.10);font-size:13px;font-weight:1000;letter-spacing:1px;color:#e8f7ff;word-break:break-all;margin-bottom:12px}.modalActions{position:relative;display:flex;gap:10px;margin-top:14px}.modalActions .btn{flex:1}.modalClose{position:absolute;right:12px;top:12px;width:34px;height:34px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.08);color:#fff;border-radius:14px;font-size:20px;font-weight:1000}.modalDangerBtn{background:linear-gradient(135deg,#ff5f7f,#a01438)!important}.modalGoodBtn{background:linear-gradient(135deg,#20b86d,#0b6f43)!important}
body.light{--bg:#f4f8ff;--panel:#fff;--panel2:#f7fbff;--line:rgba(26,93,150,.14);--text:#071225;--muted:#4e6581;background:linear-gradient(180deg,#eff7ff,#ffffff)}body.light .card,body.light .top{background:rgba(255,255,255,.84)}body.light .input,body.light select,body.light textarea{background:#fff;color:#071225}body.light .item{background:#fff}@media(max-width:850px){body{padding:10px}.grid{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.title h1{font-size:21px}.logo{width:52px;height:52px}.row{grid-template-columns:1fr}.metric b{font-size:26px}.list{max-height:none}}
</style>
</head>
<body>
<div class="app">
  <div class="top"><img class="logo" src="logo.png" onerror="this.style.display='none'"><div class="title"><h1>Multi Plus TV Admin</h1><small>Premium Device Activation Panel</small></div><div class="topActions"><button id="themeBtn" class="iconBtn" title="Theme">◐</button><button id="refreshTopBtn" class="iconBtn" title="Refresh">⟳</button></div></div>
  <div class="statusBar"><span id="statusDot" class="dot"></span><span id="systemStatus">Starting panel...</span></div>
  <div class="grid">
    <div class="card metric"><b id="totalCount">0</b><span>Total Devices</span></div><div class="card metric"><b id="activeCount">0</b><span>Active</span></div><div class="card metric"><b id="pendingCount">0</b><span>Pending</span></div><div class="card metric"><b id="blockedCount">0</b><span>Blocked</span></div><div class="card metric"><b id="expiredCount">0</b><span>Expired</span></div>
  </div>
  <div class="layout">
    <div class="section card">
      <h2>Activate Device</h2>
      <div class="field"><label>Device Code</label><input id="deviceCode" class="input" placeholder="MP-XXXX-XXXX-XXXX" style="text-transform:uppercase;letter-spacing:1px"></div>
      <div class="field"><label>Customer Name</label><input id="customerName" class="input" placeholder="Customer name"></div>
      <div class="row"><div class="field"><label>Validity Days</label><select id="validDays"><option>30</option><option>60</option><option>90</option><option>180</option><option>365</option></select></div><div class="field"><label>Device Type</label><select id="deviceType"><option value="auto">Auto</option><option value="android">Android</option><option value="desktop">Desktop</option></select></div></div>
      <div class="field"><label>Note</label><textarea id="note" placeholder="Optional note"></textarea></div>
      <button id="activateBtn" class="btn" style="width:100%">Activate Device</button>
      <div id="actMsg" class="msg"></div>
      <div id="activeBox" class="activeBox hidden"></div>
    </div>
    <div class="section card">
      <h2>User Management</h2>
      <div class="field"><label>Search Code / Customer</label><input id="search" class="input" placeholder="Device code or customer name"></div>
      <div class="row"><button id="refreshBtn" class="btn secondary">Refresh</button><button id="clearBtn" class="btn secondary">Clear</button></div>
      <div id="manageMsg" class="msg"></div>
    </div>
  </div>
  <div class="section card"><h2>Device Activation Log</h2><div id="deviceList" class="list"></div></div>
</div>
<div id="adminModal" class="modalOverlay hidden">
  <div class="modalBox">
    <button id="modalClose" class="modalClose">×</button>
    <div class="modalHead"><div id="modalIcon" class="modalIcon">✓</div><div><h3 id="modalTitle" class="modalTitle">Confirm</h3><div id="modalText" class="modalText"></div></div></div>
    <div id="modalCode" class="modalCode"></div>
    <div id="modalInputWrap" class="field hidden"><label id="modalInputLabel">Days</label><input id="modalInput" class="input" inputmode="numeric"></div>
    <div class="modalActions"><button id="modalCancel" class="btn secondary">Cancel</button><button id="modalConfirm" class="btn">Confirm</button></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id),COLLECTION=(window.MPTV_FIREBASE_SETTINGS&&window.MPTV_FIREBASE_SETTINGS.deviceActivationCollection)||'deviceActivations';
let db=null,unsub=null,all=[];function now(){return Date.now()}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function msg(id,t,type=''){const e=$(id);if(e){e.textContent=t||'';e.className='msg '+type}}function setStatus(t,type='wait'){const d=$('statusDot'),s=$('systemStatus');s.textContent=t;d.className='dot '+(type==='ok'?'ok':type==='err'?'err':'')}function toMillis(v){if(!v)return 0;if(typeof v==='number')return v;if(typeof v==='string'){const t=Date.parse(v);return Number.isFinite(t)?t:0}if(v.toMillis)return v.toMillis();if(typeof v.seconds==='number')return v.seconds*1000;return 0}function fmt(ms){if(!ms)return 'N/A';return new Date(ms).toLocaleString('en-US',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}function norm(v){return String(v||'').trim().toUpperCase().replace(/\s+/g,'')}function configMissing(){const c=window.MPTV_FIREBASE_CONFIG||{};return !c.apiKey||!c.projectId||!c.appId}function init(){if(configMissing()){setStatus('Panel ready.','wait');msg('manageMsg','','');return false}try{if(!firebase.apps.length)firebase.initializeApp(window.MPTV_FIREBASE_CONFIG);db=firebase.firestore();setStatus('Live permission active.','ok');listen();return true}catch(e){setStatus('Connection not ready.','wait');msg('manageMsg','','');return false}}
function statusOf(d){const exp=toMillis(d.expiryAt||d.expiryDate);const st=String(d.status||'pending').toLowerCase();const pm=String(d.permission||d.adminPermission||d.livePermission||'').toLowerCase();if(st==='blocked'||pm==='blocked'||pm==='deny')return 'blocked';if(exp&&now()>exp)return 'expired';return st==='active'?'active':'pending'}function statusLabel(st){return {active:'Active',pending:'Pending',blocked:'Blocked',expired:'Expired'}[st]||st}function deviceLabel(v){return {android:'Android',desktop:'Desktop',auto:'Auto'}[String(v||'').toLowerCase()]||String(v||'N/A')}
function premiumModal(o){return new Promise(resolve=>{const m=$('adminModal'),ic=$('modalIcon'),t=$('modalTitle'),tx=$('modalText'),cd=$('modalCode'),iw=$('modalInputWrap'),inp=$('modalInput'),il=$('modalInputLabel'),ok=$('modalConfirm'),cancel=$('modalCancel'),close=$('modalClose');o=o||{};ic.textContent=o.icon||'✓';ic.className='modalIcon '+(o.danger?'danger':'');t.textContent=o.title||'Confirm';tx.textContent=o.text||'';cd.textContent=o.code||'';cd.classList.toggle('hidden',!o.code);iw.classList.toggle('hidden',!o.input);if(o.input){il.textContent=o.inputLabel||'Value';inp.value=o.inputValue||'';setTimeout(()=>inp.focus(),60)}ok.textContent=o.confirmText||'Confirm';ok.className='btn '+(o.danger?'modalDangerBtn':o.good?'modalGoodBtn':'');m.classList.remove('hidden');function done(v){m.classList.add('hidden');ok.onclick=cancel.onclick=close.onclick=null;resolve(v)}ok.onclick=()=>done(o.input?String(inp.value||'').trim():true);cancel.onclick=()=>done(false);close.onclick=()=>done(false);});}function listen(){if(!db)return;if(unsub)unsub();setStatus('Loading devices...');unsub=db.collection(COLLECTION).orderBy('createdAt','desc').limit(300).onSnapshot(s=>{all=s.docs.map(doc=>({id:doc.id,...doc.data()}));setStatus('Live permission is active.','ok');render()},e=>{setStatus('Connection not ready.','wait');msg('manageMsg','','')})}
function render(){const q=$('search').value.trim().toLowerCase();const list=all.filter(x=>!q||String(x.id||x.requestCode||'').toLowerCase().includes(q)||String(x.customerName||'').toLowerCase().includes(q));const c={total:all.length,active:0,pending:0,blocked:0,expired:0};all.forEach(x=>{const s=statusOf(x);c[s]=(c[s]||0)+1});$('totalCount').textContent=c.total;$('activeCount').textContent=c.active;$('pendingCount').textContent=c.pending;$('blockedCount').textContent=c.blocked;$('expiredCount').textContent=c.expired;$('deviceList').innerHTML=list.length?list.map(itemHtml).join(''):'<div class="meta">No devices found.</div>'}
function itemHtml(x){const st=statusOf(x),exp=toMillis(x.expiryAt||x.expiryDate),code=x.id||x.requestCode;return `<div class="item"><div class="itemTop"><div class="code">${esc(code)}</div><div class="chip ${esc(st)}">${esc(statusLabel(st))}</div></div><div class="meta">Customer: <b>${esc(x.customerName||'N/A')}</b><br>Expiry: ${esc(fmt(exp))}<br>Device: ${esc(deviceLabel(x.deviceType))}<br>Last Online Check: ${esc(fmt(toMillis(x.lastOnlineCheckAt||x.lastLoginAt)))}<br>Permission: ${esc(st==='blocked'?'Blocked':'Allowed')}</div><div class="actions"><button class="smallBtn" onclick="copyCode('${esc(code)}')">Copy</button><button class="smallBtn ${st==='blocked'?'good':'danger'}" onclick="toggleBlock('${esc(code)}','${esc(st)}')">${st==='blocked'?'Unblock':'Block'}</button><button class="smallBtn warn" onclick="renew('${esc(code)}')">Renew</button><button class="smallBtn" onclick="removeDevice('${esc(code)}')">Delete</button></div></div>`}
$('activateBtn').onclick=async()=>{if(!db){msg('actMsg','Connection not ready.','wait');return}const code=norm($('deviceCode').value),name=$('customerName').value.trim(),days=Number($('validDays').value)||30,dt=$('deviceType').value;if(!code){msg('actMsg','Enter the device code.','err');return}if(!name){msg('actMsg','Enter customer name.','err');return}$('activateBtn').disabled=true;try{const expiryAt=new Date(now()+days*86400000);const data={requestCode:code,customerName:name,status:'active',validDays:days,expiryAt,createdAt:firebase.firestore.FieldValue.serverTimestamp(),activatedAt:firebase.firestore.FieldValue.serverTimestamp(),note:$('note').value.trim(),online:false,permission:'active',adminPermission:'active',livePermission:'allow',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),permissionUpdatedAt:firebase.firestore.FieldValue.serverTimestamp()};if(dt!=='auto')data.deviceType=dt;await db.collection(COLLECTION).doc(code).set(data,{merge:true});$('activeBox').textContent=code;$('activeBox').classList.remove('hidden');try{await navigator.clipboard.writeText(code)}catch(e){}msg('actMsg','Device activated successfully.','ok');$('deviceCode').value='';$('customerName').value='';$('note').value=''}catch(e){msg('actMsg','Action failed.','err')}finally{$('activateBtn').disabled=false}};
window.copyCode=async code=>{try{await navigator.clipboard.writeText(code);msg('manageMsg','Copied: '+code,'ok')}catch(e){msg('manageMsg',code,'ok')}};window.toggleBlock=async(code,st)=>{const block=st!=='blocked';const ok=await premiumModal({title:block?'Block Device':'Unblock Device',text:block?'This device will be locked when it receives live permission.':'This device will be allowed again.',code,icon:block?'!':'✓',danger:block,good:!block,confirmText:block?'Block':'Unblock'});if(!ok)return;try{await db.collection(COLLECTION).doc(code).update({status:block?'blocked':'active',permission:block?'blocked':'active',adminPermission:block?'blocked':'active',livePermission:block?'deny':'allow',updatedAt:firebase.firestore.FieldValue.serverTimestamp(),permissionUpdatedAt:firebase.firestore.FieldValue.serverTimestamp(),blockedAt:block?firebase.firestore.FieldValue.serverTimestamp():null,unblockedAt:block?null:firebase.firestore.FieldValue.serverTimestamp()});msg('manageMsg',block?'Block permission sent to the user app.':'Allow permission sent to the user app.','ok')}catch(e){msg('manageMsg','Action failed.','err')}};window.renew=async code=>{const value=await premiumModal({title:'Renew Device',text:'Enter how many days you want to extend this activation.',code,icon:'↻',input:true,inputLabel:'Extend Days',inputValue:'30',good:true,confirmText:'Renew'});const days=Number(value)||0;if(days<=0)return;try{const ref=db.collection(COLLECTION).doc(code),doc=await ref.get(),d=doc.data()||{},base=Math.max(now(),toMillis(d.expiryAt||d.expiryDate)||now());await ref.update({status:'active',permission:'active',adminPermission:'active',livePermission:'allow',expiryAt:new Date(base+days*86400000),renewedAt:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp(),permissionUpdatedAt:firebase.firestore.FieldValue.serverTimestamp()});msg('manageMsg','Renew completed successfully.','ok')}catch(e){msg('manageMsg','Action failed.','err')}};window.removeDevice=async code=>{const ok=await premiumModal({title:'Delete Device',text:'This activation record will be removed from the database.',code,icon:'×',danger:true,confirmText:'Delete'});if(!ok)return;try{await db.collection(COLLECTION).doc(code).delete();msg('manageMsg','Deleted successfully.','ok')}catch(e){msg('manageMsg','Action failed.','err')}};
$('search').addEventListener('input',render);$('refreshBtn').onclick=()=>render();$('refreshTopBtn').onclick=()=>{if(db)listen();else init()};$('clearBtn').onclick=()=>{$('search').value='';render();msg('manageMsg','','')};$('themeBtn').onclick=()=>document.body.classList.toggle('light');init();
</script>
</body></html>
